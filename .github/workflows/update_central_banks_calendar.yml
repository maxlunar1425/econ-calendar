name: Update Central Banks Calendar

# Builds central_banks_calendar.ics and publishes it to GitHub Pages.
# NOTE: this does NOT re-scrape the central bank websites -- that
# happens on its own weekly schedule in "Update Central Bank Dates"
# (update_central_bank_dates.yml). This workflow just re-renders the
# .ics file from whatever sources/central_bank_dates.json currently
# contains, which is cheap, so it's fine to run this more often than
# the underlying data actually changes.

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours, UTC
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Central Banks calendar
        run: python3 build_central_banks_ics.py

      - name: Copy output into docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp output/central_banks_calendar.ics docs/central_banks_calendar.ics

      - name: Commit and push if changed (with retry on race conditions)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/central_banks_calendar.ics
          git diff --cached --quiet || git commit -m "Auto-update Central Banks ICS"

          n=0
          until [ $n -ge 5 ]
          do
            git pull --rebase origin main && git push && break
            n=$((n+1))
            echo "Push attempt $n failed (likely a concurrent workflow), retrying..."
            sleep $((RANDOM % 5 + 1))
          done
          if [ $n -ge 5 ]; then
            echo "Push failed after 5 attempts"
            exit 1
          fi
