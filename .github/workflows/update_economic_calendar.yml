name: Update Economic Calendar ICS

# Runs automatically on a schedule, and lets you trigger it manually too.
# Adjust the cron schedule as you like. This example runs every 4 hours.
# NOTE: Forex Factory rate-limits this feed to ~2 requests per 5 minutes
# per IP, so don't set this more aggressively than every 30-60 minutes.
on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours, UTC
  workflow_dispatch: {}      # adds a manual "Run workflow" button in GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate calendar
        run: python3 generate_economic_calendar_ics.py

      - name: Copy output into docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp output/economic_calendar.ics docs/economic_calendar.ics

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/economic_calendar.ics
          git diff --cached --quiet || git commit -m "Auto-update economic calendar ICS"
          git push
