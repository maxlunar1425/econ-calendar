name: Update Central Bank Dates (Scraped from Official Sources)

# Runs the scrapers weekly and commits the regenerated
# sources/central_bank_dates.json. Central bank meeting dates change
# rarely, so this runs far less often than the Forex Factory workflow.

on:
  schedule:
    - cron: "0 6 * * 1"    # every Monday at 06:00 UTC
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run all bank scrapers and regenerate central_bank_dates.json
        working-directory: scrapers
        run: python3 build_central_bank_json.py

      - name: Commit and push if changed (with retry on race conditions)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/central_bank_dates.json
          git diff --cached --quiet || git commit -m "Auto-update central bank dates from official sources"

          n=0
          until [ $n -ge 5 ]
          do
            git pull --rebase origin main && git push && break
            n=$((n+1))
            echo "Push attempt $n failed (likely a concurrent workflow), retrying..."
            sleep $((RANDOM % 5 + 1))
          done
          if [ $n -ge 5 ]; then
            echo "Push failed after 5 attempts"
            exit 1
          fi
